<style>
  :root {
    --surface-1:      #ffffff;
    --page-plane:     #dceedc;
    --text-primary:   #10241a;
    --text-secondary: #445c4c;
    --text-muted:     #5a6c5e;
    --gridline:       #d7e6d6;
    --border:         rgba(16,36,26,0.16);
    --border-strong:  rgba(16,36,26,0.24);
    --card-shadow:    0 1px 2px rgba(16,36,26,0.05), 0 6px 16px rgba(16,36,26,0.08);
    --accent:         #2a78d6;
    --focus-ring:      #2a78d6;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--page-plane);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.45;
  }
  .page { max-width: 1280px; margin: 0 auto; padding: 24px 24px 64px; }

  a, button { font-family: inherit; }
  button { cursor: pointer; }
  button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
  }

  /* ---------- Site nav ---------- */
  .site-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    background: var(--surface-1);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    border-radius: 12px;
    padding: 8px 10px;
    margin-bottom: 16px;
  }
  .site-nav-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .site-nav-link:hover { background: #f1f1ef; color: var(--text-primary); }
  .site-nav-link.active { background: rgba(42,120,214,0.12); color: var(--accent); }
  .site-nav-home-tag { font-size: 0.6875rem; font-weight: 600; color: var(--text-muted); }
  .site-nav-link.active .site-nav-home-tag { color: var(--accent); opacity: 0.75; }
  .site-nav-divider { width: 1px; align-self: stretch; background: var(--border); margin: 4px 2px; }
  .site-nav-group-label {
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    padding: 0 2px 0 8px;
    white-space: nowrap;
  }
  .site-nav-sublink { font-weight: 500; }

  @media (max-width: 720px) {
    .site-nav-divider { display: none; }
    .site-nav-group-label { padding-left: 0; width: 100%; }
  }

  /* ---------- Top bar ---------- */
  /* Card-styled (like every other section) so its title text sits on the
     bright --surface-1 background rather than directly on the saturated
     --page-plane green, which would cap heading contrast to a razor-thin
     ~4.5:1 no matter whether the text were black or white. */
  .topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    background: var(--surface-1);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    border-radius: 12px;
    padding: 18px 22px;
  }
  .topbar h1 {
    font-size: 1.375rem;
    font-weight: 700;
    margin: 0;
  }
  .ledger-subtitle {
    margin: 4px 0 0;
    font-size: 0.875rem;
    color: var(--text-secondary);
  }

  .btn {
    appearance: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 0.875rem;
    font-weight: 600;
    border: 1px solid var(--border-strong);
    background: var(--surface-1);
    color: var(--text-primary);
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .btn:hover { background: #f1f1ef; }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text-secondary);
  }
  .btn-ghost:hover { background: #eeeeec; }
  .btn-ghost:disabled { opacity: 0.45; cursor: default; }
  .btn:disabled:hover { background: inherit; }

  /* ---------- Status panel (loading / error / empty) ---------- */
  .status-panel {
    background: var(--surface-1);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    border-radius: 12px;
    padding: 32px 24px;
    text-align: center;
    color: var(--text-secondary);
  }
  .status-panel.error {
    text-align: left;
    border-color: rgba(208,59,59,0.35);
    background: rgba(208,59,59,0.06);
  }
  .status-panel h2 {
    margin: 0 0 8px;
    font-size: 1rem;
    color: var(--text-primary);
  }
  .status-panel .error-icon { color: #d03b3b; font-weight: 700; }
  .status-panel code {
    background: #eeeeec;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.85em;
  }

  /* ---------- Summary bar (stat tiles) ---------- */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }
  .stat-tile {
    background: var(--surface-1);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .stat-tile .stat-label {
    font-size: 1.0625rem;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin: 0 0 6px;
  }
  .stat-tile .stat-value {
    font-size: 1.28775rem;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.2;
  }

  /* ---------- Filters row ---------- */
  .filters-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-wrap: wrap;
    background: var(--surface-1);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 18px;
  }
  .filters-row .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .filters-row .field-label {
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .filters-row input,
  .filters-row select {
    font-size: 0.875rem;
    padding: 7px 10px;
    border-radius: 7px;
    border: 1px solid var(--border-strong);
    background: #ffffff;
    color: var(--text-primary);
  }
  .filters-row .date-fields { display: flex; gap: 8px; }
  .filters-row .date-field { display: flex; flex-direction: column; gap: 4px; }
  .filters-row .date-fields input { width: 150px; }
  .result-count {
    font-size: 0.8125rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ---------- Table ---------- */
  .table-card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; min-width: 640px; }
  thead th {
    text-align: left;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    padding: 11px 14px;
    border-bottom: 1px solid var(--gridline);
    white-space: nowrap;
    user-select: none;
  }
  thead th.sortable { cursor: pointer; }
  thead th.sortable:hover { color: var(--text-secondary); }
  thead th.num { text-align: right; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--gridline); vertical-align: middle; }
  .muted-cell { color: var(--text-muted); }

  .empty-note {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9375rem;
  }

  /* ---------- Pagination ---------- */
  /* Card-styled for the same reason as .topbar: --text-muted/--text-secondary
     need to sit on --surface-1, not directly on the saturated --page-plane. */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
    background: var(--surface-1);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    border-radius: 12px;
    padding: 12px 16px;
  }
  #pageInfo { font-size: 0.8125rem; color: var(--text-muted); }
  .page-buttons { display: flex; gap: 8px; align-items: center; }
  .page-buttons .page-current {
    font-size: 0.8125rem;
    color: var(--text-secondary);
    padding: 0 6px;
    font-variant-numeric: tabular-nums;
  }

  [hidden] { display: none !important; }

  @media (max-width: 720px) {
    .page { padding: 16px 14px 48px; }
    .filters-row { flex-direction: column; align-items: stretch; }
    .filters-row .date-fields { flex-direction: column; }
    .filters-row .date-fields input { width: 100%; }
  }
</style>

      <a class="site-nav-link site-nav-sublink" href="#food-and-brev-e" data-ledger-key="food-and-brev-e">Food and Brev E</a>
    </nav>

    <header class="topbar">
      <div>
        <h1>Zoho ERP Ledgers</h1>
        <p class="ledger-subtitle" id="ledgerSubtitle"></p>
      </div>
    </header>

    <div id="statusPanel"></div>

    <div id="dashboardContent" hidden>
      <section class="summary-bar" id="summaryBar" aria-label="Summary"></section>

      <section class="filters-row" aria-label="Filters">
        <div class="field">
          <span class="field-label">Date range</span>
          <div class="date-fields">
            <div class="date-field">
              <label class="field-label" for="dateFrom">From</label>
              <input id="dateFrom" type="date" aria-label="From date">
            </div>
            <div class="date-field">
              <label class="field-label" for="dateTo">To</label>
              <input id="dateTo" type="date" aria-label="To date">
            </div>
          </div>
        </div>
        <button id="clearFiltersBtn" class="btn btn-ghost" type="button">Clear filters</button>
        <span class="result-count" id="resultCount"></span>
      </section>

      <section class="table-card">
        <div class="table-scroll">
          <table id="ledgerTable">
            <thead>
              <tr>
                <th class="sortable" data-sort="date" tabindex="0" role="button" aria-sort="none">Date</th>
                <th class="sortable" data-sort="reference_number" tabindex="0" role="button" aria-sort="none">Reference Number</th>
                <th class="sortable" data-sort="description" tabindex="0" role="button" aria-sort="none">Description</th>
                <th class="sortable num" data-sort="debit_amount" tabindex="0" role="button" aria-sort="none">Debit</th>
                <th class="sortable num" data-sort="credit_amount" tabindex="0" role="button" aria-sort="none">Credit</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <p class="empty-note" id="noResults" hidden>No entries for this ledger.</p>
      </section>

      <footer class="pagination" id="pagination">
        <span id="pageInfo"></span>
        <div class="page-buttons">
          <button id="prevPage" class="btn btn-ghost" type="button">Prev</button>
          <span class="page-current" id="pageCurrent"></span>
          <button id="nextPage" class="btn btn-ghost" type="button">Next</button>
        </div>
      </footer>
    </div>
  </div>

<script>
(function () {
  'use strict';

  var PAGE_SIZE = 50;

  /* Maps the hash slug used in nav links/URLs to the ledger name that keys
     the embedded ledgers-data object (must match LEDGER_NAMES in
     fetch_ledgers.py, including the trailing "." on OFFICE 2 PROJECT.). */
  var LEDGER_KEYS = {
    'office-1': 'OFFICE 1 WASHROOM PROJECT',
    'office-2': 'OFFICE 2 PROJECT.',
    'food-and-brev-e': 'Food and Brev E'
  };
  var DEFAULT_LEDGER_KEY = 'office-1';

  var state = {
    ledgersData: {},
    ledgerKey: DEFAULT_LEDGER_KEY,
    all: [],
    filtered: [],
    page: 1,
    sortKey: 'date',
    sortDir: 'desc',
    dateFrom: '',
    dateTo: ''
  };

  var $ = function (sel) { return document.querySelector(sel); };

  var statusPanel = $('#statusPanel');
  var dashboardContent = $('#dashboardContent');
  var ledgerSubtitle = $('#ledgerSubtitle');
  var summaryBar = $('#summaryBar');
  var dateFromInput = $('#dateFrom');
  var dateToInput = $('#dateTo');
  var clearFiltersBtn = $('#clearFiltersBtn');
  var resultCount = $('#resultCount');
  var tableBody = $('#tableBody');
  var noResults = $('#noResults');
  var pageInfo = $('#pageInfo');
  var pageCurrent = $('#pageCurrent');
  var prevPageBtn = $('#prevPage');
  var nextPageBtn = $('#nextPage');

  var inrFormatter;
  try {
    inrFormatter = new Intl.NumberFormat('en-IN', {
      style: 'currency',
      currency: 'INR',
      maximumFractionDigits: 2,
      minimumFractionDigits: 2
    });
  } catch (e) {
    inrFormatter = null;
  }

  function formatCurrency(value) {
    if (typeof value !== 'number' || isNaN(value)) return '—';
    if (inrFormatter) return inrFormatter.format(value);
    return '₹' + value.toFixed(2);
  }

  function formatAmountOrDash(value) {
    return (typeof value === 'number' && value !== 0) ? formatCurrency(value) : '—';
  }

  function formatCount(n) {
    return n.toLocaleString('en-IN');
  }

  function safeText(value) {
    return (value === null || value === undefined || value === '') ? '' : String(value);
  }

  /* ---------------- Loading ---------------- */
  /* Ledger data is embedded directly in this page as a JSON <script> block
     (#ledgers-data) rather than fetched -- no fetch(), so this works from a
     double-clicked file:// page with no local server. */

  function showErrorPanel(message) {
    dashboardContent.hidden = true;

    var panel = document.createElement('div');
    panel.className = 'status-panel error';

    var h2 = document.createElement('h2');
    var icon = document.createElement('span');
    icon.className = 'error-icon';
    icon.textContent = '⚠ ';
    h2.appendChild(icon);
    h2.appendChild(document.createTextNode('Could not load ledger data'));
    panel.appendChild(h2);

    var p = document.createElement('p');
    p.style.marginBottom = '4px';
    p.textContent = message;
    panel.appendChild(p);

    var p2 = document.createElement('p');
    p2.style.marginBottom = '0';
    var code = document.createElement('code');
    code.textContent = 'python fetch_ledgers.py';
    p2.appendChild(document.createTextNode('Run '));
    p2.appendChild(code);
    p2.appendChild(document.createTextNode(' to refresh the embedded data, then reload this page.'));
    panel.appendChild(p2);

    statusPanel.innerHTML = '';
    statusPanel.appendChild(panel);
    statusPanel.hidden = false;
  }

  function keyFromHash() {
    var raw = (location.hash || '').replace(/^#/, '');
    return LEDGER_KEYS.hasOwnProperty(raw) ? raw : DEFAULT_LEDGER_KEY;
  }

  function init() {
    var dataEl = document.getElementById('ledgers-data');
    var ledgersData;
    try {
      ledgersData = dataEl ? JSON.parse(dataEl.textContent) : undefined;
    } catch (e) {
      showErrorPanel('The embedded ledgers-data block could not be parsed as JSON.');
      return;
    }
    if (!ledgersData || typeof ledgersData !== 'object' || Array.isArray(ledgersData)) {
      showErrorPanel('No ledgers-data block was found on this page.');
      return;
    }

    state.ledgersData = ledgersData;
    statusPanel.hidden = true;
    statusPanel.innerHTML = '';
    dashboardContent.hidden = false;

    selectLedger(keyFromHash());
  }

  /* ---------------- Ledger selection ---------------- */

  /* Filters reset (not persist) on every ledger switch -- each ledger is a
     different project's data, and carrying a date range or search term
     across to an unrelated ledger would silently produce a misleading
     "no entries" view rather than the fresh, full picture a nav click
     implies. Sort order is a table-view preference, not data-specific, so
     it deliberately does carry over. */
  function selectLedger(key) {
    state.ledgerKey = key;
    var ledgerName = LEDGER_KEYS[key];
    var ledger = state.ledgersData[ledgerName];
    state.all = (ledger && Array.isArray(ledger.entries)) ? ledger.entries : [];
    state.page = 1;
    state.dateFrom = '';
    state.dateTo = '';
    dateFromInput.value = '';
    dateToInput.value = '';

    ledgerSubtitle.textContent = ledgerName;
    updateNavActive(key);
    applyFiltersAndRender();
  }

  function updateNavActive(key) {
    document.querySelectorAll('.site-nav-sublink').forEach(function (a) {
      if (a.getAttribute('data-ledger-key') === key) {
        a.classList.add('active');
      } else {
        a.classList.remove('active');
      }
    });
  }

  /* ---------------- Filtering ---------------- */

  function matchesFilters(entry) {
    if (state.dateFrom && state.dateTo) {
      if (!entry.date || entry.date < state.dateFrom || entry.date > state.dateTo) return false;
    } else if (state.dateFrom) {
      if (entry.date !== state.dateFrom) return false;
    } else if (state.dateTo) {
      if (entry.date !== state.dateTo) return false;
    }

    return true;
  }

  /* ---------------- Sorting ---------------- */

  function compareValues(a, b, key) {
    if (key === 'debit_amount' || key === 'credit_amount') {
      var na = typeof a[key] === 'number' ? a[key] : -Infinity;
      var nb = typeof b[key] === 'number' ? b[key] : -Infinity;
      return na - nb;
    }
    var sa = safeText(a[key]).toLowerCase();
    var sb = safeText(b[key]).toLowerCase();
    if (sa < sb) return -1;
    if (sa > sb) return 1;
    return 0;
  }

  function applyFiltersAndRender() {
    var filtered = state.all.filter(matchesFilters);
    filtered.sort(function (a, b) {
      var cmp = compareValues(a, b, state.sortKey);
      return state.sortDir === 'asc' ? cmp : -cmp;
    });
    state.filtered = filtered;

    var maxPage = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if (state.page > maxPage) state.page = maxPage;
    if (state.page < 1) state.page = 1;

    // Summary tiles reflect whatever the table currently shows, so they use
    // the filtered set, same as renderTable/renderPagination.
    renderSummary(filtered);
    renderTable(filtered);
    renderPagination(filtered);
    renderResultCount(filtered);
    renderSortHeaders();
  }

  /* ---------------- Rendering: summary ---------------- */

  function renderSummary(entries) {
    summaryBar.innerHTML = '';

    var totalDebit = 0;
    var totalCredit = 0;
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      totalDebit += (typeof e.debit_amount === 'number' ? e.debit_amount : 0);
      totalCredit += (typeof e.credit_amount === 'number' ? e.credit_amount : 0);
    }

    summaryBar.appendChild(makeStatTile('Total entries', formatCount(entries.length)));
    summaryBar.appendChild(makeStatTile('Total debit', formatCurrency(totalDebit)));
    summaryBar.appendChild(makeStatTile('Total credit', formatCurrency(totalCredit)));
    summaryBar.appendChild(makeStatTile('Net (debit − credit)', formatCurrency(totalDebit - totalCredit)));
  }

  function makeStatTile(label, value) {
    var tile = document.createElement('div');
    tile.className = 'stat-tile';
    var labelEl = document.createElement('p');
    labelEl.className = 'stat-label';
    labelEl.textContent = label;
    var valueEl = document.createElement('p');
    valueEl.className = 'stat-value';
    valueEl.textContent = value;
    tile.appendChild(labelEl);
    tile.appendChild(valueEl);
    return tile;
  }

  function renderResultCount(filtered) {
    var totalAll = state.all.length;
    if (filtered.length === totalAll) {
      resultCount.textContent = formatCount(totalAll) + ' entry(ies)';
    } else {
      resultCount.textContent = formatCount(filtered.length) + ' of ' + formatCount(totalAll) + ' entry(ies)';
    }
  }

  /* ---------------- Rendering: table ---------------- */

  function renderSortHeaders() {
    var headers = document.querySelectorAll('#ledgerTable thead th.sortable');
    headers.forEach(function (th) {
      var key = th.getAttribute('data-sort');
      if (key === state.sortKey) {
        th.setAttribute('aria-sort', state.sortDir === 'asc' ? 'ascending' : 'descending');
      } else {
        th.setAttribute('aria-sort', 'none');
      }
    });
  }

  function renderTable(filtered) {
    tableBody.innerHTML = '';

    if (filtered.length === 0) {
      noResults.hidden = false;
      return;
    }
    noResults.hidden = true;

    var startIdx = (state.page - 1) * PAGE_SIZE;
    var pageItems = filtered.slice(startIdx, startIdx + PAGE_SIZE);

    var frag = document.createDocumentFragment();
    pageItems.forEach(function (entry) {
      frag.appendChild(buildRow(entry));
    });
    tableBody.appendChild(frag);
  }

  function buildRow(entry) {
    var tr = document.createElement('tr');

    var tdDate = document.createElement('td');
    tdDate.textContent = safeText(entry.date) || '—';
    if (!entry.date) tdDate.classList.add('muted-cell');
    tr.appendChild(tdDate);

    var tdRef = document.createElement('td');
    var refText = safeText(entry.reference_number);
    tdRef.textContent = refText || '—';
    if (!refText) tdRef.classList.add('muted-cell');
    tr.appendChild(tdRef);

    var tdDesc = document.createElement('td');
    var descText = safeText(entry.description);
    tdDesc.textContent = descText || '—';
    if (!descText) tdDesc.classList.add('muted-cell');
    tr.appendChild(tdDesc);

    var tdDebit = document.createElement('td');
    tdDebit.className = 'num';
    tdDebit.textContent = formatAmountOrDash(entry.debit_amount);
    tr.appendChild(tdDebit);

    var tdCredit = document.createElement('td');
    tdCredit.className = 'num';
    tdCredit.textContent = formatAmountOrDash(entry.credit_amount);
    tr.appendChild(tdCredit);

    return tr;
  }

  /* ---------------- Pagination ---------------- */

  function renderPagination(filtered) {
    var total = filtered.length;
    var maxPage = Math.max(1, Math.ceil(total / PAGE_SIZE));
    var startIdx = total === 0 ? 0 : (state.page - 1) * PAGE_SIZE + 1;
    var endIdx = Math.min(state.page * PAGE_SIZE, total);

    pageInfo.textContent = total === 0
      ? 'Showing 0 of 0'
      : 'Showing ' + formatCount(startIdx) + '–' + formatCount(endIdx) + ' of ' + formatCount(total);
    pageCurrent.textContent = 'Page ' + state.page + ' of ' + maxPage;

    prevPageBtn.disabled = state.page <= 1;
    nextPageBtn.disabled = state.page >= maxPage;
  }

  /* ---------------- Events ---------------- */

  dateFromInput.addEventListener('change', function () {
    state.dateFrom = dateFromInput.value;
    state.page = 1;
    applyFiltersAndRender();
  });

  dateToInput.addEventListener('change', function () {
    state.dateTo = dateToInput.value;
    state.page = 1;
    applyFiltersAndRender();
  });

  clearFiltersBtn.addEventListener('click', function () {
    dateFromInput.value = '';
    dateToInput.value = '';
    state.dateFrom = '';
    state.dateTo = '';
    state.page = 1;
    applyFiltersAndRender();
  });

  document.querySelectorAll('#ledgerTable thead th.sortable').forEach(function (th) {
    var key = th.getAttribute('data-sort');
    function activate() {
      if (state.sortKey === key) {
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortKey = key;
        state.sortDir = 'asc';
      }
      state.page = 1;
      applyFiltersAndRender();
    }
    th.addEventListener('click', activate);
    th.addEventListener('keydown', function (evt) {
      if (evt.key === 'Enter' || evt.key === ' ') {
        evt.preventDefault();
        activate();
      }
    });
  });

  prevPageBtn.addEventListener('click', function () {
    if (state.page > 1) {
      state.page -= 1;
      renderTable(state.filtered);
      renderPagination(state.filtered);
    }
  });

  nextPageBtn.addEventListener('click', function () {
    var maxPage = Math.max(1, Math.ceil(state.filtered.length / PAGE_SIZE));
    if (state.page < maxPage) {
      state.page += 1;
      renderTable(state.filtered);
      renderPagination(state.filtered);
    }
  });

  window.addEventListener('hashchange', function () {
    selectLedger(keyFromHash());
  });

  init();
})();
</script>
</body>
</html>
